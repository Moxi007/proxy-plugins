name: PingMe 自动化签到+视频奖励
description: 抓取 PingMe 账号请求参数，并执行签到与视频奖励任务。
author: 莫西
homepage: https://github.com/Moxi007/proxy-plugins
icon: gift.fill

scriptings:
  - http_request:
      name: PingMe 参数抓取
      match: ^https:\/\/api\.pingmeapp\.net\/app\/queryBalanceAndBonus
      script_url: https://raw.githubusercontent.com/Moxi007/proxy-plugins/main/egern/scripts/PingMe.egern.js
      timeout: 60
      body_required: false
  - schedule:
      name: PingMe 签到
      cron: "30 8,20 * * *"
      script_url: https://raw.githubusercontent.com/Moxi007/proxy-plugins/main/egern/scripts/PingMe.egern.js
      timeout: 300
  - generic:
      name: PingMe 手动签到
      script_url: https://raw.githubusercontent.com/Moxi007/proxy-plugins/main/egern/scripts/PingMe.egern.js
      timeout: 300
  - generic:
      name: PingMe 清除失效账号
      script_url: https://raw.githubusercontent.com/Moxi007/proxy-plugins/main/egern/scripts/PingMe.clear-invalid.egern.js
      timeout: 120

mitm:
  hostnames:
    - api.pingmeapp.net
